<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>GLB Viewer</title>

  <!-- Import model-viewer -->
  <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>

  <style>
    body {
      margin: 0;
      background-color: #87CEEB; /* sky blue */
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    model-viewer {
      width: 80%;
      height: 80%;
      background-color: transparent;
    }
  </style>
</head>
<body>

  <model-viewer
    src="Coba.glb"
    alt="3D model"
    camera-controls
    disable-zoom="false"
    auto-rotate="false"
    shadow-intensity="1"
    exposure="1"
  >
  </model-viewer>

</body>
</html>
