<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GPR 3D Subsurface</title>
    <style>
        body { 
            margin: 0; 
            /* Background changed to sky blue */
            background-color: skyblue; 
        }
        model-viewer {
            width: 100vw;
            height: 100vh;
            /* Ensuring the viewer itself reflects the background */
            background-color: skyblue;
        }
    </style>
</head>
<body>

    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/4.0.0/model-viewer.min.js"></script>

    <model-viewer 
        src="Coba.glb" 
        alt="3D GPR Data" 
        camera-controls 
        shadow-intensity="1"
        exposure="1">
    </model-viewer>

</body>
</html>
